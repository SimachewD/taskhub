syntax = "proto3";

package taskhub;

option go_package = "github.com/SimachewD/taskhub/proto";

service UserService {

  rpc CreateUser(CreateUserRequest)
      returns (UserResponse);

  rpc GetUser(GetUserRequest)
      returns (UserResponse);

}

message CreateUserRequest {
  string name = 1;
  string email = 2;
}

message GetUserRequest {
  string id = 1;
}

message UserResponse {
  string id = 1;
  string name = 2;
  string email = 3;
}

service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  string user_id = 2;
}

service TaskService {

  rpc CreateTask(CreateTaskRequest)
      returns (TaskResponse);

  rpc UpdateTask(UpdateTaskRequest) 
      returns (TaskResponse);
      
  rpc GetTask(GetTaskRequest)
      returns (TaskResponse);

  rpc ListTasks(ListTasksRequest) 
      returns (ListTasksResponse);

  rpc DeleteTask(DeleteTaskRequest)
      returns (DeleteTaskResponse);
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string user_id = 3;
}

message UpdateTaskRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

message GetTaskRequest {
  string id = 1;
}

message TaskResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string user_id = 4;
  bool completed = 5;
  string created_at = 6;
}

message ListTasksRequest {
  string user_id = 1;
  int32 limit = 2;
  string cursor = 3;
}

message ListTasksResponse {
  repeated TaskResponse tasks = 1;
  string next_cursor = 2;
}

message DeleteTaskRequest {
  string id = 1;
}

message DeleteTaskResponse {
  bool success = 1;
}

service NotificationService {
  rpc SubscribeTasks(SubscribeTasksRequest) 
      returns (stream NotificationResponse);
}

message SubscribeTasksRequest {
  string user_id = 1;
}

message NotificationResponse {
    string event = 1;
    TaskResponse task = 2;
}